<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VocabFlow</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Tajawal:wght@400;500;700&display=swap');

  :root {
    --blue: #3b82f6; --blue-dark: #1d4ed8; --blue-glow: rgba(59,130,246,0.35);
    --green: #10b981; --green-dark: #059669; --green-glow: rgba(16,185,129,0.35);
    --teal: #06b6d4; --teal-glow: rgba(6,182,212,0.3);
    --bg: #0a0f1e; --surface: #111827; --surface2: #1a2235; --surface3: #1f2d42;
    --border: rgba(99,179,237,0.15); --text: #e2e8f0; --muted: #94a3b8;
    --correct: #10b981; --wrong: #ef4444; --gold: #f59e0b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
  .bg-orbs { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
  .orb { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.18; }
  .orb1 { width: 500px; height: 500px; background: #3b82f6; top: -100px; left: -100px; }
  .orb2 { width: 400px; height: 400px; background: #10b981; bottom: -80px; right: -80px; }
  .orb3 { width: 300px; height: 300px; background: #06b6d4; top: 40%; left: 60%; }
  #app { position: relative; z-index: 1; }

  .onboard { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
  .onboard-card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 3rem; max-width: 480px; width: 100%; text-align: center; box-shadow: 0 0 60px rgba(59,130,246,0.12), 0 0 120px rgba(16,185,129,0.08); }
  .logo { font-size: 2.5rem; font-weight: 700; margin-bottom: 0.5rem; }
  .logo span:first-child { color: var(--blue); } .logo span:last-child { color: var(--green); }
  .tagline { color: var(--muted); margin-bottom: 2.5rem; font-size: 0.95rem; }
  .input-group { margin-bottom: 1.25rem; text-align: left; }
  .input-group label { display: block; font-size: 0.8rem; font-weight: 500; color: var(--muted); margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.05em; }
  .input-group input { width: 100%; padding: 0.75rem 1rem; border-radius: 12px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-size: 1rem; font-family: inherit; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
  .input-group input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-glow); }
  .gender-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; margin-bottom: 1.5rem; }
  .gender-btn { padding: 0.75rem; border-radius: 12px; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); cursor: pointer; font-family: inherit; font-size: 0.9rem; transition: all 0.2s; }
  .gender-btn:hover { border-color: var(--blue); color: var(--text); }
  .gender-btn.active { border-color: var(--blue); background: rgba(59,130,246,0.15); color: var(--blue); box-shadow: 0 0 12px var(--blue-glow); }
  .btn-primary { width: 100%; padding: 0.875rem; border-radius: 14px; border: none; cursor: pointer; background: linear-gradient(135deg, var(--blue), var(--green)); color: #fff; font-size: 1rem; font-weight: 600; font-family: inherit; transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s; box-shadow: 0 4px 24px var(--blue-glow); }
  .btn-primary:hover { opacity: 0.92; box-shadow: 0 6px 32px var(--blue-glow); }
  .btn-primary:active { transform: scale(0.98); }

  .app-wrap { max-width: 900px; margin: 0 auto; padding: 1.5rem; }
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.5rem; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 1.5rem; box-shadow: 0 0 30px rgba(59,130,246,0.08); }
  .topbar-logo { font-weight: 700; font-size: 1.1rem; }
  .topbar-logo span:first-child { color: var(--blue); } .topbar-logo span:last-child { color: var(--green); }
  .user-badge { display: flex; align-items: center; gap: 0.5rem; background: var(--surface2); border: 1px solid var(--border); border-radius: 999px; padding: 0.35rem 1rem; font-size: 0.85rem; }
  .user-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green-glow); }

  .lang-tabs { display: flex; gap: 0.5rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .lang-tab { padding: 0.5rem 1.25rem; border-radius: 999px; border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; font-family: inherit; font-size: 0.875rem; font-weight: 500; transition: all 0.2s; white-space: nowrap; }
  .lang-tab:hover { border-color: var(--blue); color: var(--text); }
  .lang-tab.active { border-color: var(--blue); background: rgba(59,130,246,0.15); color: var(--blue); box-shadow: 0 0 16px var(--blue-glow); }

  .unit-select-wrap { margin-bottom: 1rem; }
  .unit-select { width: 100%; padding: 0.7rem 1rem; border-radius: 12px; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: inherit; font-size: 0.875rem; outline: none; cursor: pointer; }
  .unit-select:focus { border-color: var(--blue); }
  .unit-select option { background: var(--surface2); color: var(--text); }

  .mode-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 0.75rem; margin-bottom: 1.5rem; }
  @media(max-width:600px){ .mode-grid { grid-template-columns: repeat(2,1fr); } }
  .mode-card { padding: 1rem; border-radius: 16px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; text-align: center; transition: all 0.2s; }
  .mode-card:hover { border-color: var(--blue); box-shadow: 0 0 20px var(--blue-glow); }
  .mode-card.active { border-color: var(--green); background: rgba(16,185,129,0.1); box-shadow: 0 0 24px var(--green-glow); }
  .mode-icon { font-size: 1.5rem; margin-bottom: 0.4rem; }
  .mode-name { font-size: 0.8rem; font-weight: 600; color: var(--text); }
  .mode-desc { font-size: 0.7rem; color: var(--muted); margin-top: 0.2rem; }

  .stats-bar { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .stat-chip { display: flex; align-items: center; gap: 0.4rem; padding: 0.4rem 0.875rem; background: var(--surface); border: 1px solid var(--border); border-radius: 999px; font-size: 0.8rem; }
  .stat-chip .val { font-weight: 600; color: var(--text); }
  .stat-chip .lbl { color: var(--muted); }

  .progress-wrap { margin-bottom: 1.5rem; }
  .progress-info { display: flex; justify-content: space-between; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.4rem; }
  .progress-bar { height: 6px; background: var(--surface2); border-radius: 999px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--blue), var(--green)); border-radius: 999px; transition: width 0.4s ease; box-shadow: 0 0 8px var(--blue-glow); }

  .card-area { perspective: 1200px; margin-bottom: 1.5rem; }
  .flashcard { position: relative; width: 100%; min-height: 280px; border-radius: 24px; cursor: pointer; transform-style: preserve-3d; transition: transform 0.55s cubic-bezier(.4,.2,.2,1); user-select: none; }
  .flashcard.flipped { transform: rotateY(180deg); }
  .card-face { position: absolute; width: 100%; min-height: 280px; border-radius: 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; backface-visibility: hidden; padding: 2rem; }
  .card-front { background: var(--surface); border: 1px solid var(--border); box-shadow: 0 0 40px rgba(59,130,246,0.15), 0 0 80px rgba(16,185,129,0.08); }
  .card-back { background: var(--surface2); border: 1px solid rgba(16,185,129,0.3); box-shadow: 0 0 40px rgba(16,185,129,0.2); transform: rotateY(180deg); }
  .card-lang-badge { position: absolute; top: 1rem; left: 1rem; font-size: 0.7rem; font-weight: 600; padding: 0.25rem 0.625rem; border-radius: 999px; background: rgba(59,130,246,0.2); color: var(--blue); border: 1px solid rgba(59,130,246,0.3); max-width: 70%; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
  .card-back .card-lang-badge { background: rgba(16,185,129,0.15); color: var(--green); border-color: rgba(16,185,129,0.3); }
  .card-word { font-size: clamp(1.3rem, 4vw, 2.2rem); font-weight: 700; text-align: center; color: var(--text); line-height: 1.3; margin-bottom: 0.5rem; }
  .card-word.arabic { font-family: 'Tajawal', sans-serif; direction: rtl; font-size: clamp(1.1rem,3vw,1.7rem); }
  .card-hint { font-size: 0.8rem; color: var(--muted); }
  .flip-hint { position: absolute; bottom: 1rem; right: 1rem; font-size: 0.7rem; color: var(--muted); opacity: 0.7; }

  .card-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem; }
  .grade-btns { display: flex; gap: 0.5rem; flex-wrap: wrap; }
  .grade-btn { padding: 0.5rem 1rem; border-radius: 10px; border: none; font-family: inherit; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .grade-again { background: rgba(239,68,68,0.2); color: #fca5a5; border: 1px solid rgba(239,68,68,0.3); }
  .grade-again:hover { background: rgba(239,68,68,0.35); box-shadow: 0 0 12px rgba(239,68,68,0.3); }
  .grade-hard { background: rgba(245,158,11,0.2); color: #fcd34d; border: 1px solid rgba(245,158,11,0.3); }
  .grade-hard:hover { background: rgba(245,158,11,0.35); }
  .grade-good { background: rgba(59,130,246,0.2); color: #93c5fd; border: 1px solid rgba(59,130,246,0.3); }
  .grade-good:hover { background: rgba(59,130,246,0.35); }
  .grade-easy { background: rgba(16,185,129,0.2); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.3); }
  .grade-easy:hover { background: rgba(16,185,129,0.35); box-shadow: 0 0 12px var(--green-glow); }

  .toast { position: fixed; top: 1.5rem; left: 50%; transform: translateX(-50%); padding: 0.875rem 1.5rem; border-radius: 14px; font-size: 0.875rem; font-weight: 500; z-index: 1000; pointer-events: none; transition: opacity 0.3s; max-width: 90vw; text-align: center; }
  .toast.correct { background: rgba(16,185,129,0.2); border: 1px solid rgba(16,185,129,0.4); color: #6ee7b7; box-shadow: 0 0 24px var(--green-glow); }
  .toast.wrong { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; box-shadow: 0 0 20px rgba(239,68,68,0.2); }
  .toast.hidden { opacity: 0; }

  .mcq-word { font-size: clamp(1.4rem,4vw,2.2rem); font-weight: 700; text-align: center; margin-bottom: 2rem; padding: 2rem; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; box-shadow: 0 0 30px rgba(59,130,246,0.1); }
  .mcq-word.arabic { font-family: 'Tajawal', sans-serif; direction: rtl; }
  .mcq-options { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
  @media(max-width:500px){ .mcq-options { grid-template-columns: 1fr; } }
  .mcq-option { padding: 1rem 1.25rem; border-radius: 14px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; font-family: inherit; font-size: 0.85rem; color: var(--text); text-align: left; transition: all 0.2s; line-height: 1.4; }
  .mcq-option:hover:not(:disabled) { border-color: var(--blue); box-shadow: 0 0 14px var(--blue-glow); }
  .mcq-option.correct { border-color: var(--correct); background: rgba(16,185,129,0.15); color: #6ee7b7; box-shadow: 0 0 16px var(--green-glow); }
  .mcq-option.wrong { border-color: var(--wrong); background: rgba(239,68,68,0.1); color: #fca5a5; }
  .mcq-option:disabled { cursor: not-allowed; }
  .mcq-option.arabic { font-family: 'Tajawal', sans-serif; direction: rtl; text-align: right; }

  .write-word { font-size: clamp(1.5rem,5vw,2.4rem); font-weight: 700; text-align: center; color: var(--text); margin-bottom: 0.5rem; }
  .write-word.arabic { font-family: 'Tajawal', sans-serif; direction: rtl; }
  .write-hint { font-size: 0.85rem; color: var(--muted); text-align: center; margin-bottom: 1.5rem; }
  .write-input { width: 100%; padding: 1rem 1.25rem; border-radius: 14px; font-size: 1rem; background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-family: inherit; outline: none; transition: border-color 0.2s, box-shadow 0.2s; margin-bottom: 1rem; }
  .write-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-glow); }
  .write-input.arabic { font-family: 'Tajawal', sans-serif; direction: rtl; text-align: right; }
  .write-input.correct-input { border-color: var(--correct); box-shadow: 0 0 0 3px var(--green-glow); }
  .write-input.wrong-input { border-color: var(--wrong); box-shadow: 0 0 0 3px rgba(239,68,68,0.2); }
  .write-answer { margin-top: 0.75rem; padding: 0.75rem 1rem; background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.25); border-radius: 10px; font-size: 0.9rem; color: #6ee7b7; display: none; }
  .write-answer.show { display: block; }
  .write-answer.arabic { font-family: 'Tajawal', sans-serif; direction: rtl; text-align: right; }

  .match-timer-bar { height: 6px; background: var(--surface2); border-radius: 999px; overflow: hidden; margin-bottom: 1.5rem; }
  .match-timer-fill { height: 100%; background: linear-gradient(90deg, var(--green), var(--blue)); border-radius: 999px; transition: width 0.1s linear; box-shadow: 0 0 8px var(--green-glow); }
  .match-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .match-timer-text { font-size: 1.2rem; font-weight: 700; color: var(--text); }
  .match-score { font-size: 0.9rem; color: var(--muted); }
  .match-cols { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .match-col-title { font-size: 0.7rem; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem; text-align: center; }
  .match-item { padding: 0.75rem 1rem; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; font-family: inherit; font-size: 0.78rem; color: var(--text); transition: all 0.2s; margin-bottom: 0.5rem; text-align: center; line-height: 1.4; min-height: 50px; display: flex; align-items: center; justify-content: center; }
  .match-item:hover { border-color: var(--blue); box-shadow: 0 0 12px var(--blue-glow); }
  .match-item.selected { border-color: var(--blue); background: rgba(59,130,246,0.2); box-shadow: 0 0 16px var(--blue-glow); }
  .match-item.matched { border-color: var(--correct); background: rgba(16,185,129,0.15); color: #6ee7b7; pointer-events: none; }
  .match-item.wrong-flash { border-color: var(--wrong); background: rgba(239,68,68,0.15); }
  .match-item.arabic { font-family: 'Tajawal', sans-serif; direction: rtl; }

  .session-done { text-align: center; padding: 3rem 2rem; background: var(--surface); border: 1px solid var(--border); border-radius: 24px; box-shadow: 0 0 60px rgba(16,185,129,0.15); }
  .done-emoji { font-size: 3rem; margin-bottom: 1rem; }
  .done-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
  .done-msg { color: var(--muted); margin-bottom: 2rem; }
  .done-stats { display: flex; justify-content: center; gap: 2rem; margin-bottom: 2rem; flex-wrap: wrap; }
  .done-stat { text-align: center; }
  .done-stat .n { font-size: 2rem; font-weight: 700; }
  .done-stat .n.green { color: var(--green); }
  .done-stat .n.red { color: #ef4444; }
  .done-stat .l { font-size: 0.8rem; color: var(--muted); }
  .done-btns { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
  .btn-sec { padding: 0.75rem 1.5rem; border-radius: 12px; border: 1px solid var(--border); background: transparent; color: var(--text); font-family: inherit; font-size: 0.875rem; cursor: pointer; transition: all 0.2s; font-weight: 500; }
  .btn-sec:hover { border-color: var(--blue); box-shadow: 0 0 12px var(--blue-glow); }

  .deck-info { font-size: 0.75rem; color: var(--muted); text-align: center; padding: 0.5rem; }
  .hidden { display: none !important; }
  .fade-in { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
  .shake { animation: shake 0.4s ease; }

  @media(max-width:480px){
    .topbar { padding: 0.75rem 1rem; } .app-wrap { padding: 0.75rem; }
    .flashcard, .card-face { min-height: 220px; } .card-word { font-size: 1.2rem; }
    .mcq-word { font-size: 1.3rem; padding: 1.25rem; }
  }
</style>
</head>
<body>
<div class="bg-orbs"><div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div></div>
<div id="app">

<div id="screen-onboard" class="onboard">
  <div class="onboard-card fade-in">
    <div class="logo"><span>Vocab</span><span>Flow</span></div>
    <p class="tagline">3,767 real cards · Italian · French · English · Spanish · Arabic</p>
    <div class="input-group">
      <label>Your name</label>
      <input type="text" id="user-name" placeholder="e.g. Zain" autocomplete="off">
    </div>
    <div class="input-group"><label>Gender (for motivational messages)</label></div>
    <div class="gender-btns">
      <button class="gender-btn" data-g="male" onclick="setGender('male',this)">👨 Male</button>
      <button class="gender-btn" data-g="female" onclick="setGender('female',this)">👩 Female</button>
    </div>
    <button class="btn-primary" onclick="startApp()">Let's go! 🚀</button>
  </div>
</div>

<div id="screen-main" class="hidden">
  <div class="app-wrap">
    <div class="topbar">
      <div class="topbar-logo"><span>Vocab</span><span>Flow</span></div>
      <div class="user-badge"><div class="user-dot"></div><span id="topbar-user">Zain</span></div>
    </div>

    <div class="lang-tabs">
      <button class="lang-tab active" onclick="setLang('italian',this)">🇮🇹 Italian</button>
      <button class="lang-tab" onclick="setLang('french',this)">🇫🇷 French</button>
      <button class="lang-tab" onclick="setLang('english',this)">🇬🇧 English</button>
      <button class="lang-tab" onclick="setLang('spanish',this)">🇪🇸 Spanish</button>
      <button class="lang-tab" onclick="setLang('arabic',this)">📖 Arabic</button>
    </div>

    <div class="unit-select-wrap">
      <select class="unit-select" id="unit-select" onchange="onUnitChange()"></select>
    </div>

    <div class="mode-grid">
      <div class="mode-card active" onclick="setMode('classic',this)">
        <div class="mode-icon">🃏</div><div class="mode-name">Classic</div><div class="mode-desc">Flip & grade</div>
      </div>
      <div class="mode-card" onclick="setMode('mcq',this)">
        <div class="mode-icon">🎯</div><div class="mode-name">Quiz</div><div class="mode-desc">4 choices</div>
      </div>
      <div class="mode-card" onclick="setMode('write',this)">
        <div class="mode-icon">✍️</div><div class="mode-name">Writing</div><div class="mode-desc">Type answer</div>
      </div>
      <div class="mode-card" onclick="setMode('match',this)">
        <div class="mode-icon">⚡</div><div class="mode-name">Match</div><div class="mode-desc">Timed pairs</div>
      </div>
    </div>

    <div class="stats-bar" id="stats-bar">
      <div class="stat-chip"><span class="val" id="stat-total">0</span><span class="lbl">cards</span></div>
      <div class="stat-chip"><span style="color:var(--green)">✓</span><span class="val" id="stat-correct">0</span><span class="lbl">correct</span></div>
      <div class="stat-chip"><span style="color:#ef4444">✗</span><span class="val" id="stat-wrong">0</span><span class="lbl">wrong</span></div>
      <div class="stat-chip"><span class="val" id="stat-streak">0</span><span class="lbl">🔥 streak</span></div>
    </div>

    <div class="progress-wrap">
      <div class="progress-info"><span id="prog-text">Card 1 of 0</span><span id="prog-pct">0%</span></div>
      <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    </div>

    <div id="study-area"></div>
    <div class="deck-info" id="deck-info"></div>
  </div>
</div>

  state.toStudy = deck.map((c,i)=>({...c,id:i}));
  shuffle(state.toStudy);
  state.idx = 0; state.flipped = false; state.streak = 0;
  state.sessionCorrect = 0; state.sessionWrong = 0; state.done = false;
  if(state.matchData && state.matchData.timerInt) clearInterval(state.matchData.timerInt);
  updateStats();
  render();
}

function setLang(lang, el){
  state.lang = lang;
  document.querySelectorAll('.lang-tab').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  populateUnitSelect();
  initStudy();
}

function setMode(mode, el){
  state.mode = mode;
  document.querySelectorAll('.mode-card').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  state.idx = 0; state.flipped = false; state.done = false;
  if(state.matchData && state.matchData.timerInt) clearInterval(state.matchData.timerInt);
  render();
}

function updateStats(){
  const deck = currentDeck();
  document.getElementById('stat-total').textContent = deck.length;
  document.getElementById('stat-correct').textContent = state.sessionCorrect;
  document.getElementById('stat-wrong').textContent = state.sessionWrong;
  document.getElementById('stat-streak').textContent = state.streak;
  const total = state.toStudy.length;
  const pct = total ? Math.round((state.idx / total)*100) : 0;
  document.getElementById('prog-text').textContent = `Card ${Math.min(state.idx+1,total)} of ${total}`;
  document.getElementById('prog-pct').textContent = pct+'%';
  document.getElementById('progress-fill').style.width = pct+'%';
}

function render(){
  if(state.done){ renderDone(); return; }
  if(state.mode==='classic') renderClassic();
  else if(state.mode==='mcq') renderMCQ();
  else if(state.mode==='write') renderWrite();
  else if(state.mode==='match') renderMatch();
  updateStats();
}

function renderClassic(){
  const card = state.toStudy[state.idx];
  if(!card){ state.done=true; renderDone(); return; }
  const isAr = isArabicText(card.w);
  const isArT = isArabicText(card.t);
  document.getElementById('study-area').innerHTML = `
    <div class="card-area">
      <div class="flashcard ${state.flipped?'flipped':''}" id="flashcard" onclick="flipCard()">
        <div class="card-face card-front">
          <div class="card-lang-badge">${LANG_LABELS[state.lang]}</div>
          <div class="card-word ${isAr?'arabic':''}">${card.w}</div>
          <div class="card-hint">Tap to reveal</div>
          <div class="flip-hint">click / tap</div>
        </div>
        <div class="card-face card-back">
          <div class="card-lang-badge">${LANG_TARGET_LABELS[state.lang]}</div>
          <div class="card-word ${isArT?'arabic':''}">${card.t}</div>
          <div class="flip-hint">grade below</div>
        </div>
      </div>
    </div>
    <div class="card-nav" style="${state.flipped?'':'opacity:0.3;pointer-events:none'}">
      <span style="font-size:0.8rem;color:var(--muted)">How well did you know it?</span>
      <div class="grade-btns">
        <button class="grade-btn grade-again" onclick="gradeCard(0)">Again</button>
        <button class="grade-btn grade-hard" onclick="gradeCard(1)">Hard</button>
        <button class="grade-btn grade-good" onclick="gradeCard(2)">Good</button>
        <button class="grade-btn grade-easy" onclick="gradeCard(3)">Easy ✓</button>
      </div>
    </div>
    <div class="deck-info">Tap card to flip • Grade after revealing</div>
  `;
}

function flipCard(){
  state.flipped = !state.flipped;
  document.getElementById('flashcard').classList.toggle('flipped', state.flipped);
  const nav = document.querySelector('.card-nav');
  if(nav){ nav.style.opacity = state.flipped ? '1' : '0.3'; nav.style.pointerEvents = state.flipped ? 'auto' : 'none'; }
}

function gradeCard(grade){
  state.flipped = false;
  if(grade >= 2){
    state.sessionCorrect++; state.streak++;
    showToast(getRandom(motivations[state.gender].correct),'correct');
  } else {
    state.sessionWrong++; state.streak=0;
    const c = state.toStudy[state.idx];
    if(grade===0) state.toStudy.push({...c});
    showToast(getRandom(motivations[state.gender].wrong),'wrong');
  }
  state.idx++;
  if(state.idx >= state.toStudy.length){ state.done=true; renderDone(); return; }
  render();
}

function renderMCQ(){
  const card = state.toStudy[state.idx];
  if(!card){ state.done=true; renderDone(); return; }
  const deck = currentDeck();
  const choices = [card.t];
  let attempts = 0;
  while(choices.length < 4 && attempts < 50){
    const r = getRandom(deck).t;
    if(!choices.includes(r)) choices.push(r);
    attempts++;
  }
  shuffle(choices);
  const isAr = isArabicText(card.w);
  document.getElementById('study-area').innerHTML = `
    <div class="mcq-word ${isAr?'arabic':''} fade-in">${card.w}</div>
    <div class="mcq-options" id="mcq-opts">
      ${choices.map((c,i)=>`<button class="mcq-option ${isArabicText(c)?'arabic':''}" data-choice="${i}" onclick="checkMCQ(${i},this)">${c}</button>`).join('')}
    </div>
  `;
  window._mcqChoices = choices;
  window._mcqCorrect = card.t;
}

function checkMCQ(idx, el){
  const chosen = window._mcqChoices[idx];
  const correct = window._mcqCorrect;
  document.querySelectorAll('.mcq-option').forEach(b=>b.disabled=true);
  if(chosen===correct){
    el.classList.add('correct');
    state.sessionCorrect++; state.streak++;
    showToast(getRandom(motivations[state.gender].correct),'correct');
    setTimeout(()=>{ state.idx++; render(); },900);
  } else {
    el.classList.add('wrong');
    document.querySelectorAll('.mcq-option').forEach((b,i)=>{ if(window._mcqChoices[i]===correct) b.classList.add('correct'); });
    state.sessionWrong++; state.streak=0;
    const orig = state.toStudy[state.idx];
    state.toStudy.push({...orig});
    showToast(getRandom(motivations[state.gender].wrong),'wrong');
    setTimeout(()=>{ state.idx++; if(state.idx>=state.toStudy.length){state.done=true;renderDone();}else render(); },1400);
  }
  updateStats();
}

function renderWrite(){
  const card = state.toStudy[state.idx];
  if(!card){ state.done=true; renderDone(); return; }
  const isAr = isArabicText(card.w);
  const answerIsAr = isArabicText(card.t);
  document.getElementById('study-area').innerHTML = `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:2rem;text-align:center;box-shadow:0 0 30px rgba(59,130,246,0.1)">
      <div class="write-word ${isAr?'arabic':''} fade-in">${card.w}</div>
      <div class="write-hint">Type the translation</div>
      <input type="text" class="write-input ${answerIsAr?'arabic':''}" id="write-input" placeholder="${answerIsAr?'اكتب هنا...':'Type here...'}" autocomplete="off" onkeydown="if(event.key==='Enter')checkWrite()">
      <button class="btn-primary" style="margin-bottom:0.5rem" onclick="checkWrite()">Check ✓</button>
      <button class="btn-sec" style="margin-top:0.5rem;width:100%" onclick="skipWrite()">Skip →</button>
      <div class="write-answer ${answerIsAr?'arabic':''}" id="write-answer"></div>
    </div>
  `;
  setTimeout(()=>document.getElementById('write-input')?.focus(),100);
}

function normalize(s){ return s.trim().toLowerCase().replace(/[\u064B-\u065F]/g,''); }

function checkWrite(){
  const input = document.getElementById('write-input');
  if(!input) return;
  const val = input.value.trim();
  if(!val) return;
  const card = state.toStudy[state.idx];
  const ans = document.getElementById('write-answer');
  const correct = normalize(card.t);
  const given = normalize(val);
  const correctFirst = correct.split('/')[0].trim();
  if(given===correct || correct.includes(given) || given===correctFirst){
    input.classList.add('correct-input'); input.disabled=true;
    state.sessionCorrect++; state.streak++;
    showToast(getRandom(motivations[state.gender].correct),'correct');
    setTimeout(()=>{ state.idx++; render(); },800);
  } else {
    input.classList.add('wrong-input');
    input.classList.add('shake');
    ans.textContent = '✓ ' + card.t;
    ans.classList.add('show');
    state.sessionWrong++; state.streak=0;
    state.toStudy.push({...card});
    showToast(getRandom(motivations[state.gender].wrong),'wrong');
    setTimeout(()=>{ state.idx++; if(state.idx>=state.toStudy.length){state.done=true;renderDone();}else render(); },1800);
  }
  updateStats();
}

function skipWrite(){
  state.idx++;
  if(state.idx>=state.toStudy.length){state.done=true;renderDone();}
  else render();
}

function renderMatch(){
  const deck = currentDeck();
  if(deck.length < 4){
    document.getElementById('study-area').innerHTML = `<div class="deck-info">Need at least 4 cards for Match mode. Pick a bigger unit.</div>`;
    return;
  }
  const pairs = shuffle([...deck]).slice(0,6);
  const lefts = shuffle(pairs.map(p=>({w:p.w,id:p.w+'|'+p.t})));
  const rights = shuffle(pairs.map(p=>({w:p.t,id:p.w+'|'+p.t})));
  state.matchData = { pairs, time:60, matchedCount:0, total:pairs.length, timerInt:null };
  state.matchSel = {side:null,id:null,el:null};

  document.getElementById('study-area').innerHTML = `
    <div class="match-header">
      <div class="match-timer-text" id="match-time">60s</div>
      <div class="match-score">Matched: <span id="match-score">0</span>/${pairs.length}</div>
    </div>
    <div class="match-timer-bar"><div class="match-timer-fill" id="match-timer-fill" style="width:100%"></div></div>
    <div class="match-cols">
      <div>
        <div class="match-col-title">${LANG_LABELS[state.lang]}</div>
        <div id="match-left">${lefts.map(it=>`<div class="match-item ${isArabicText(it.w)?'arabic':''}" data-id="${it.id}" data-side="left" onclick="selectMatch('left','${it.id.replace(/'/g,"\\'")}',this)">${it.w}</div>`).join('')}</div>
      </div>
      <div>
        <div class="match-col-title">${LANG_TARGET_LABELS[state.lang]}</div>
        <div id="match-right">${rights.map(it=>`<div class="match-item ${isArabicText(it.w)?'arabic':''}" data-id="${it.id}" data-side="right" onclick="selectMatch('right','${it.id.replace(/'/g,"\\'")}',this)">${it.w}</div>`).join('')}</div>
      </div>
    </div>
  `;

  state.matchData.timerInt = setInterval(()=>{
    state.matchData.time--;
    const el = document.getElementById('match-time');
    const fill = document.getElementById('match-timer-fill');
    if(el) el.textContent = state.matchData.time+'s';
    if(fill) fill.style.width = (state.matchData.time/60*100)+'%';
    if(state.matchData.time <= 0){ clearInterval(state.matchData.timerInt); showMatchResult(); }
  },1000);
}

function selectMatch(side, id, el){
  if(el.classList.contains('matched')) return;
  const sel = state.matchSel;
  if(sel.side === side){
    if(sel.el) sel.el.classList.remove('selected');
    state.matchSel = {side,id,el}; el.classList.add('selected'); return;
  }
  if(sel.side && sel.side !== side){
    el.classList.add('selected');
    if(sel.id === id){
      el.classList.remove('selected'); sel.el?.classList.remove('selected');
      el.classList.add('matched'); sel.el?.classList.add('matched');
      state.matchData.matchedCount++;
      document.getElementById('match-score').textContent = state.matchData.matchedCount;
      state.sessionCorrect++; state.streak++;
      showToast(getRandom(motivations[state.gender].correct),'correct');
      if(state.matchData.matchedCount >= state.matchData.total){
        clearInterval(state.matchData.timerInt);
        setTimeout(showMatchResult,500);
      }
    } else {
      el.classList.add('wrong-flash'); sel.el?.classList.add('wrong-flash');
      state.sessionWrong++; state.streak=0;
      showToast(getRandom(motivations[state.gender].wrong),'wrong');
      const elCopy = el, selElCopy = sel.el;
      setTimeout(()=>{ elCopy.classList.remove('wrong-flash','selected'); selElCopy?.classList.remove('wrong-flash','selected'); },600);
      state.matchSel = {side:null,id:null,el:null};
      updateStats(); return;
    }
    state.matchSel = {side:null,id:null,el:null};
  } else {
    el.classList.add('selected');
    state.matchSel = {side,id,el};
  }
  updateStats();
}

function showMatchResult(){
  if(state.matchData.timerInt) clearInterval(state.matchData.timerInt);
  const done = state.matchData.matchedCount;
  const total = state.matchData.total;
  const pct = Math.round(done/total*100);
  const emoji = pct===100?'🏆':pct>=60?'💪':'😅';
  document.getElementById('study-area').innerHTML = `
    <div class="session-done fade-in">
      <div class="done-emoji">${emoji}</div>
      <div class="done-title" style="color:var(--blue)">Match Round Done!</div>
      <div class="done-msg">${done}/${total} pairs matched</div>
      <div class="done-btns">
        <button class="btn-primary" style="padding:0.75rem 2rem;width:auto" onclick="renderMatch()">Play Again 🔄</button>
      </div>
    </div>
  `;
}

function renderDone(){
  const totalAnswered = state.sessionCorrect + state.sessionWrong;
  const pct = totalAnswered ? Math.round(state.sessionCorrect/totalAnswered*100) : 0;
  const emoji = pct>=80?'🏆':pct>=60?'⭐':'💡';
  let msg = pct>=80
    ? (state.gender==='male' ? `محترف يا ${state.name}! كنت رائع في هذه الجلسة 🔥` : `محترفة يا ${state.name}! كنتي رائعة في هذه الجلسة 🔥`)
    : pct>=60
    ? (state.gender==='male' ? `أداء جيد يا ${state.name}، استمر وستتحسن أكثر!` : `أداء جيد يا ${state.name}، استمري وستتحسني أكثر!`)
    : (state.gender==='male' ? `لا تستسلم يا ${state.name}! التكرار مفتاح الإتقان 💪` : `لا تستسلمي يا ${state.name}! التكرار مفتاح الإتقان 💪`);

  document.getElementById('study-area').innerHTML = `
    <div class="session-done fade-in">
      <div class="done-emoji">${emoji}</div>
      <div class="done-title">Session Complete!</div>
      <div class="done-msg" style="font-family:'Tajawal',sans-serif;direction:rtl;font-size:1rem;margin-bottom:1.5rem">${msg}</div>
      <div class="done-stats">
        <div class="done-stat"><div class="n green">${state.sessionCorrect}</div><div class="l">Correct</div></div>
        <div class="done-stat"><div class="n red">${state.sessionWrong}</div><div class="l">Repeated</div></div>
        <div class="done-stat"><div class="n" style="color:var(--gold)">${pct}%</div><div class="l">Accuracy</div></div>
      </div>
      <div class="done-btns">
        <button class="btn-primary" style="padding:0.75rem 2rem;width:auto" onclick="initStudy()">Study Again 🔄</button>
      </div>
    </div>
  `;
}

let toastTimer = null;
function showToast(msg, type){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type}`;
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ t.classList.add('hidden'); },1800);
}
</script>
</body>
</html>
